name: Frontend CI

# Runs the bun:test unit suite on every PR/push that touches Frontend/.
on:
  pull_request:
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  test:
    name: bun test (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Run every *.test.ts EXCEPT *.integration.test.ts — integration suites
      # hit a live dev server on :4000 and belong in the E2E job, not unit CI.
      # New unit tests are picked up automatically; new integration tests are
      # auto-excluded by the naming convention.
      - name: Run unit tests
        run: |
          files=$(find app lib -name '*.test.ts' -not -name '*.integration.test.ts')
          echo "Running: $files"
          bun test $files
