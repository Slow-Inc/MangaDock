
services:
  manga-translator:
    image: manga-image-translator
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    env_file:
      - .env
    volumes:
      - ./result:/app/result
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
